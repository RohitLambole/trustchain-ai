services:
  mongodb:
    image: mongo:7
    container_name: trustchain-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  ganache:
    image: trufflesuite/ganache:v7.9.2
    container_name: trustchain-ganache
    restart: unless-stopped
    command:
      - --chain.chainId=1337
      - --wallet.mnemonic=test test test test test test test test test test test junk
      - --wallet.totalAccounts=10
      - --wallet.defaultBalance=1000
      - --server.host=0.0.0.0
      - --server.port=8545
    ports:
      - "8545:8545"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:8545',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({jsonrpc:'2.0',method:'eth_chainId',params:[],id:1})}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  blockchain-deployer:
    image: node:22-alpine
    container_name: trustchain-blockchain-deployer
    working_dir: /workspace
    volumes:
      - ./blockchain:/workspace
    environment:
      GANACHE_RPC_URL: http://ganache:8545
      GANACHE_PRIVATE_KEY: 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
    command: sh -c "npm ci && npm run compile && npm run deploy:ganache"
    depends_on:
      ganache:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trustchain-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4000
      MONGODB_URI: mongodb://mongodb:27017/trustchain_ai
      CORS_ORIGINS: http://localhost:3000
      JWT_ACCESS_SECRET: local-dev-access-secret-change-before-production-123456
      JWT_REFRESH_SECRET: local-dev-refresh-secret-change-before-production-123456
      JWT_ISSUER: trustchain-ai
      JWT_AUDIENCE: trustchain-ai-api
      ACCESS_TOKEN_TTL_SECONDS: 900
      REFRESH_TOKEN_TTL_SECONDS: 2592000
      PASSWORD_BCRYPT_ROUNDS: 12
      TOTP_ISSUER: TrustChain AI
      FIELD_ENCRYPTION_KEY_BASE64: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      PASSWORD_RESET_TTL_SECONDS: 900
      BOOTSTRAP_DATABASE_ON_START: "true"
      ML_SERVICE_URL: http://ml-service:8000
      ML_REQUEST_TIMEOUT_MS: 2500
      ML_REQUEST_RETRIES: 2
      BLOCKCHAIN_RPC_URL: http://ganache:8545
      AUDIT_TRAIL_CONTRACT_ADDRESS: 0x5FbDB2315678afecb367f032d93F642f64180aa3
      BACKEND_WRITER_PRIVATE_KEY: 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
    ports:
      - "4000:4000"
    depends_on:
      mongodb:
        condition: service_healthy
      blockchain-deployer:
        condition: service_completed_successfully
      ml-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  ml-service:
    build:
      context: ./apps/ml-service
      dockerfile: Dockerfile
    container_name: trustchain-ml-service
    restart: unless-stopped
    environment:
      ML_SERVICE_NAME: trustchain-ai-ml-service
      ML_ENVIRONMENT: development
      ML_MODEL_STORAGE_DIR: /app/storage/models
      ML_TRAIN_ON_STARTUP: "true"
      ML_SYNTHETIC_ROWS: "5000"
      ML_CONTAMINATION: "0.04"
      ML_RANDOM_STATE: "42"
    ports:
      - "8000:8000"
    volumes:
      - ml_models:/app/storage/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: trustchain-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api
      NEXT_PUBLIC_ML_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mongodb_data:
  ml_models:
